name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            npm-pkg: darwin-arm64
            binary: quikleaf
            binary-path: src-tauri/target/aarch64-apple-darwin/release/quikleaf
            archive-name: quikleaf-darwin-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            npm-pkg: darwin-x64
            binary: quikleaf
            binary-path: src-tauri/target/x86_64-apple-darwin/release/quikleaf
            archive-name: quikleaf-darwin-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            npm-pkg: linux-x64
            binary: quikleaf
            binary-path: src-tauri/target/x86_64-unknown-linux-gnu/release/quikleaf
            archive-name: quikleaf-linux-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            npm-pkg: win32-x64
            binary: quikleaf.exe
            binary-path: src-tauri/target/x86_64-pc-windows-msvc/release/quikleaf.exe
            archive-name: quikleaf-windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'quikleaf ${{ github.ref_name }}'
          releaseBody: |
            See the [CHANGELOG](https://github.com/deftio/quikleaf/blob/main/CHANGELOG.md) for details.

            ## Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Windows | `.msi` / `.exe` |
            | Linux | `.deb` / `.AppImage` |

            ## npm
            ```bash
            npm install -g quikleaf
            # or
            npx quikleaf
            ```
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Prepare npm binary package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm-pkg }}/bin
          cp ${{ matrix.binary-path }} npm/${{ matrix.npm-pkg }}/bin/${{ matrix.binary }}
          chmod +x npm/${{ matrix.npm-pkg }}/bin/${{ matrix.binary }} 2>/dev/null || true

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release-archives
          if [ "${{ runner.os }}" = "Windows" ]; then
            cd npm/${{ matrix.npm-pkg }}/bin
            7z a -tzip ../../../release-archives/${{ matrix.archive-name }}.zip ${{ matrix.binary }}
            cd ../../..
          else
            tar czf release-archives/${{ matrix.archive-name }}.tar.gz -C npm/${{ matrix.npm-pkg }}/bin ${{ matrix.binary }}
          fi

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: release-archives/*
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm-pkg }}
          path: npm/${{ matrix.npm-pkg }}/

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all npm artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Publish each platform package
      - name: Publish @deftio/quikleaf-darwin-arm64
        working-directory: artifacts/npm-darwin-arm64
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > tmp.json && mv tmp.json package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deftio/quikleaf-darwin-x64
        working-directory: artifacts/npm-darwin-x64
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > tmp.json && mv tmp.json package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deftio/quikleaf-linux-x64
        working-directory: artifacts/npm-linux-x64
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > tmp.json && mv tmp.json package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deftio/quikleaf-win32-x64
        working-directory: artifacts/npm-win32-x64
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > tmp.json && mv tmp.json package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main wrapper package
      - name: Publish quikleaf
        working-directory: npm/quikleaf
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update version in wrapper and all optionalDependencies
          jq --arg v "$VERSION" '
            .version = $v |
            .optionalDependencies = (.optionalDependencies | to_entries | map(.value = $v) | from_entries)
          ' package.json > tmp.json && mv tmp.json package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
